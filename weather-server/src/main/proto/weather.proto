syntax = "proto3";

option java_package = "com.lhcamposs.weather.grpc";
option java_outer_classname = "WeatherProto";
option java_multiple_files = true;

package weather;

service WeatherService {
  rpc ObterTemperaturaAtual (CidadeRequest) returns (TemperaturaResponse);
  rpc PrevisaoCincoDias (CidadeRequest) returns (PrevisaoResponse);
  rpc ListarCidades (ListarCidadesRequest) returns (ListarCidadesResponse);
  rpc CadastrarCidade (CadastrarCidadeRequest) returns (CadastrarCidadeResponse);
  rpc EstatisticasClimaticas (CidadeRequest) returns (EstatisticasResponse);
}

message CidadeRequest {
  string cidade = 1;
}

message TemperaturaResponse {
  string cidade = 1;
  double temperatura = 2;
  string descricao = 3;
  string unidade = 4;
}

message PrevisaoDia {
  string data = 1;
  double temp_min = 2;
  double temp_max = 3;
  string descricao = 4;
}

message PrevisaoResponse {
  string cidade = 1;
  repeated PrevisaoDia dias = 2;
}

message ListarCidadesRequest {
}

message ListarCidadesResponse {
  repeated string cidades = 1;
}

message CadastrarCidadeRequest {
  string nome = 1;
  double temperatura_inicial = 2;
}

message CadastrarCidadeResponse {
  bool sucesso = 1;
  string mensagem = 2;
}

message EstatisticasResponse {
  string cidade = 1;
  double media = 2;
  double minima = 3;
  double maxima = 4;
  int32 total_registros = 5;
}